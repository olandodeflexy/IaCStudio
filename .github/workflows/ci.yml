name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  # ─── Lint & Test ───
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Go lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

      - name: Go test
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Frontend deps
        run: cd web && npm install

      - name: Frontend lint
        run: cd web && npm run lint
        continue-on-error: true  # lint warnings should not block CI

      - name: Frontend build
        run: cd web && npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out

  # ─── Build & Release ───
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        run: cd web && npm install && npm run build

      - name: Copy frontend to embed path
        run: rm -rf cmd/server/frontend/dist && cp -r web/dist cmd/server/frontend/dist

      - name: Cross-compile
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          LDFLAGS="-s -w -X main.AppVersion=${VERSION}"
          mkdir -p dist

          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              output="dist/iac-studio-${GOOS}-${GOARCH}"
              if [ "$GOOS" = "windows" ]; then
                output="${output}.exe"
              fi
              echo "Building ${GOOS}/${GOARCH}..."
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -ldflags "$LDFLAGS" -o "$output" ./cmd/server
            done
          done

          # Create checksums
          cd dist && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/iac-studio-*
            dist/checksums.txt

  # ─── Docker Image ───
  docker:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
