version: "3.9"

services:
  iac-studio:
    build: .
    ports:
      - "127.0.0.1:3000:3000"   # Bind to localhost only — not exposed to LAN
    volumes:
      - "${HOME}/iac-projects:/projects"
      # SSH keys are NOT mounted. If git push is needed in the future,
      # use SSH agent forwarding or a deploy key mounted as a single file.
    environment:
      - IAC_STUDIO_AI_ENDPOINT=http://ollama:11434
      - IAC_STUDIO_AI_MODEL=deepseek-coder:6.7b
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    # No ports exposed to host — only reachable from iac-studio via Docker network
    volumes:
      - ollama-models:/root/.ollama
    # Pull the model on first run:
    # docker exec -it iac-studio-ollama-1 ollama pull deepseek-coder:6.7b
    restart: unless-stopped

volumes:
  ollama-models:
